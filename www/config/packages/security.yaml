security:
  password_hashers:
    App\Entity\Utilisateur:
      algorithm: bcrypt
    Symfony\Component\Security\Core\User\InMemoryUser:
      algorithm: plaintext

  providers:
    app_user_provider:
      entity:
        class: App\Entity\Utilisateur
        property: email
    swagger_users:
      memory:
        users:
          "%env(SWAGGER_USERNAME)%":
            password: "%env(SWAGGER_PASSWORD)%"
            roles: [ROLE_SWAGGER]

  firewalls:
    swagger:
      pattern: ^/api/doc
      stateless: true
      provider: swagger_users
      http_basic:
        realm: "API Documentation — Accès restreint"

    api:
      pattern: ^/api/
      stateless: true
      custom_authenticators:
        - App\Security\ApiKeyAuthenticator

    main:
      pattern: ^/
      lazy: true
      provider: app_user_provider
      form_login:
        login_path: login
        check_path: login
        default_target_path: home
      logout:
        path: logout
        target: /
      remember_me: true
      stateless: false

  access_control:
    - { path: ^/api/doc, roles: ROLE_SWAGGER }

    - { path: ^/api/, roles: ROLE_API }

    - { path: ^/login$, roles: PUBLIC_ACCESS }
    - { path: ^/logout$, roles: PUBLIC_ACCESS }
    - { path: ^/inscription$, roles: PUBLIC_ACCESS }
    - { path: ^/admin, roles: ROLE_ADMIN }
    - { path: ^/utilisateur, roles: ROLE_ADMIN }
    - { path: ^/, roles: [ROLE_GESTIONNAIRE, ROLE_ADMIN] }
